<!DOCTYPE html>
<html>
<head>
  <title>Jolt zkVM — JSON Query (no validation, ZK)</title>
  <style>
    body { font-family: monospace; max-width: 700px; margin: 40px auto; }
    input, textarea, select { font-size: 14px; padding: 4px 8px; font-family: monospace; }
    input { width: 300px; }
    textarea { width: 100%; height: 120px; }
    button { font-size: 18px; padding: 4px 16px; cursor: pointer; }
    #output { background: #f4f4f4; padding: 16px; margin-top: 16px; white-space: pre-wrap; }
  </style>
</head>
<body>
  <h2>Jolt zkVM — Private JSON Query (navigate-only, ZK, MT)</h2>
  <p>Navigates a dot-path without full JSON validation. Faster than json-parse but only proves the queried path is navigable.</p>
  <div>
    <label>Size:
      <select id="size" onchange="onSizeChange()">
        <option value="1">1 KB (18 records)</option>
        <option value="2">2 KB (36 records)</option>
        <option value="4" selected>4 KB (72 records)</option>
        <option value="8">8 KB (142 records)</option>
        <option value="16">16 KB (280 records)</option>
        <option value="32">32 KB (556 records)</option>
      </select>
    </label>
  </div>
  <div style="margin-top:8px">
    <label>Query: <input id="query" value="records.5.amount"></label>
    <button id="btn" onclick="runProve()" disabled>Prove</button>
  </div>
  <div style="margin-top:8px"><label>Private JSON (not revealed to verifier):</label></div>
  <textarea id="json" readonly></textarea>
  <div id="output">Loading WASM...</div>

  <script type="module">
    import init, { initThreadPool, preprocess, prove_json_query } from './pkg/json_query_wasm.js';

    const SIZES = { 1: 18, 2: 36, 4: 72, 8: 142, 16: 280, 32: 556 };

    function buildJson(count) {
      const records = [];
      for (let i = 0; i < count; i++) {
        records.push({
          id: i,
          amount: (i + 1) * 100,
          valid: i % 3 !== 0,
          label: `item_${String(i).padStart(4, '0')}`
        });
      }
      return JSON.stringify({ records });
    }

    let json = '';

    window.onSizeChange = function() {
      const kb = document.getElementById('size').value;
      const count = SIZES[kb];
      json = buildJson(count);
      document.getElementById('json').value = json;
      document.getElementById('query').value = `records.${count - 1}.amount`;
      if (out.textContent.startsWith('Ready')) {
        out.textContent = `Ready. JSON: ~${kb}KB (${count} records, ${json.length} bytes).`;
      }
    };

    const out = document.getElementById('output');
    onSizeChange();

    async function setup() {
      out.textContent = 'Loading WASM...';
      await init();

      const threads = navigator.hardwareConcurrency || 4;
      out.textContent = `Initializing ${threads} threads...`;
      await initThreadPool(threads);

      out.textContent = 'Preprocessing (one-time)...';
      await new Promise(r => setTimeout(r, 50));
      const t0 = performance.now();
      preprocess();
      const prepTime = ((performance.now() - t0) / 1000).toFixed(1);

      document.getElementById('btn').disabled = false;
      const kb = document.getElementById('size').value;
      out.textContent = `Ready (${threads} threads, ZK mode). Preprocessing: ${prepTime}s. JSON: ~${kb}KB (${json.length} bytes).`;
    }

    window.runProve = async function() {
      const btn = document.getElementById('btn');
      const query = document.getElementById('query').value;
      const kb = document.getElementById('size').value;

      btn.disabled = true;
      out.textContent = `Query: "${query}"\nJSON: ~${kb}KB (${json.length} bytes, private)\nProving...`;

      await new Promise(r => setTimeout(r, 50));

      const t0 = performance.now();
      try {
        const resultJson = prove_json_query(query, json);
        const elapsed = ((performance.now() - t0) / 1000).toFixed(1);
        const result = JSON.parse(resultJson);

        let msg = `Size: ~${kb}KB (${json.length} bytes)\n`;
        msg += `Query: "${query}"\n`;
        msg += `Value: ${result.value}\n`;
        msg += `Blake2b hash of JSON: ${result.blake2b_hash}\n`;
        msg += `Prove time: ${elapsed}s (excluding preprocessing)\n`;
        msg += `Proof valid: ${result.valid}\n`;
        msg += `JSON was private (not revealed to verifier)`;
        out.textContent = msg;
      } catch (e) {
        out.textContent += `\n\nError: ${e}`;
      }
      btn.disabled = false;
    };

    setup();
  </script>
</body>
</html>
